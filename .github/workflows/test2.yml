name: Ollama Cached

on:
  workflow_dispatch:

jobs:
  ollama:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Ollama cache
        id: ollama-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            /usr/local/bin/ollama
            ~/.ollama
          key: ollama-${{ runner.os }}-v1

      - name: Check cache hit
        run: |
          echo "Cache hit: ${{ steps.ollama-cache.outputs.cache-hit }}"

      - name: check
        run: ls -la /usr/local/bin || echo "Ollama not found in cache"

      - name: Install Ollama
        if: steps.ollama-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          ollama serve &
          sleep 5

      - name: Pull model
        if: steps.ollama-cache.outputs.cache-hit != 'true'
        run: |
          ollama pull llama3

      - name: Run prompt
        run: |
          ollama run llama3 "Write a haiku about GitHub Actions caching"

      - name: Save Ollama cache
        if: steps.ollama-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            /usr/local/bin/ollama
            ~/.ollama
          key: ollama-${{ runner.os }}-v1
