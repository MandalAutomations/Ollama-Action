name: 'Ollama Action'
description: 'Install Ollama, pull a model, and run a prompt'
author: 'evanallen13'

inputs:
  model:
    description: 'The Ollama model to use (e.g. llama3, mistral, gemma)'
    required: false
    default: 'tinyllama'
  prompt:
    description: 'The prompt to send to the model'
    required: false
  cache: 
    description: 'Whether to cache the model between runs (true/false)'
    required: false
    default: 'false'

outputs:
  response:
    description: 'The response from the model'
    value: ${{ steps.run-prompt.outputs.response }}

runs:
  using: 'composite'
  steps:

    - name: Restore Ollama cache
      id: ollama-cache
      uses: actions/cache/restore@v4
      with:
        path: |
          /usr/local/bin/ollama
          ~/.ollama
        key: ollama-${{ inputs.model }}

    - name: Install Ollama
      shell: bash
      if: steps.ollama-cache.outputs.cache-hit != 'true'
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    - name: Start Ollama service
      shell: bash
      run: |
        ollama serve &
        timeout=30
        while ! ollama list > /dev/null 2>&1; do
          if [ $timeout -le 0 ]; then
            echo "Timed out waiting for Ollama service to start" >&2
            exit 1
          fi
          sleep 1
          timeout=$((timeout - 1))
        done

    - name: Pull model
      if: inputs.cache != 'true' || steps.cache-ollama.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "Cache miss or caching disabled — pulling model"
        ollama pull ${{ inputs.model }}

    - name: Run prompt
      id: run-prompt
      if: inputs.prompt != ''
      shell: bash
      run: |
        if ! raw_response=$(ollama run ${{ inputs.model }} "${{ inputs.prompt }}" 2>&1); then
          echo "Error: ollama run failed: $raw_response" >&2
          exit 1
        fi
        response=$(printf '%s' "$raw_response" \
          | sed -r 's/\x1B\[[0-9;?]*[ -/]*[@-~]//g' \
          | perl -CSDA -pe 's/[\x{2800}-\x{28FF}]//g' \
          | sed -r 's/^[[:space:]]+//g' \
          | tr -d '\r')
        echo "response<<EOF" >> $GITHUB_OUTPUT
        echo "$response" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Save Ollama cache
      if: steps.ollama-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          /usr/local/bin/ollama
          ~/.ollama
        key: ollama-${{ runner.os }}-v1
